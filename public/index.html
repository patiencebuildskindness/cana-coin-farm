<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CANA Coin Farm</title>
  <meta name="theme-color" content="#042315"/>
  <link rel="stylesheet" href="/styles.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <img src="/logo.svg" class="logo" alt="CANA"/>
      <div class="titles">
        <h1>CANA Coin Farm</h1>
        <p class="subtitle">Earn-to-Learn • Grow medicinal plants • Respect traditions</p>
      </div>
    </header>

    <section class="card">
      <div class="row">
        <input id="q" class="input" placeholder="Search plants…"/>
        <button class="btn" id="refresh">Refresh</button>
        <button class="btn secondary" id="close">Close</button>
      </div>
    </section>

    <!-- XP card -->
    <section class="card" id="xpCard" style="display:none">
      <b>XP:</b> <span id="xpVal">0</span>
      <span id="badgeWrap" style="margin-left:8px;"></span>
    </section>

    <section id="list" class="grid"></section>

    <footer class="footer">
      <small>© CANA Coin Farm — alpha</small>
    </footer>
  </main>

  <template id="plant-card">
    <div class="mini card">
      <div class="name"></div>
      <div class="latin"></div>
      <button class="btn learn">I learned this (+1 XP)</button>
    </div>
  </template>

  <script>
    const tg = window.Telegram?.WebApp; if (tg) tg.expand();
    const initData = tg?.initData || '';

    const list = document.getElementById('list');
    const cardTpl = document.getElementById('plant-card');
    const refreshBtn = document.getElementById('refresh');
    const closeBtn = document.getElementById('close');
    const q = document.getElementById('q');
    const xpCard = document.getElementById('xpCard');
    const xpVal = document.getElementById('xpVal');
    const badgeWrap = document.getElementById('badgeWrap');

    let plants = [], visible = [];

    async function getXP(){
      const r = await fetch('/api/xp/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': initData },
        body: JSON.stringify({ initData })
      });
      return r.json();
    }
    async function incXP(){
      const r = await fetch('/api/xp/inc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': initData },
        body: JSON.stringify({ initData })
      });
      return r.json();
    }

    async function loadXP() {
      const s = await getXP();
      if (s.ok) {
        xpCard.style.display = 'block';
        xpVal.textContent = s.xp;
        badgeWrap.textContent = (s.badges || []).join(' • ');
      }
    }

    async function loadPlants(){
      const r = await fetch('/api/plants');
      const d = await r.json();
      plants = (d && d.ok) ? d.plants : [];
      filter();
    }

    function filter(){
      const term = q.value.trim().toLowerCase();
      visible = plants.filter(p => !term || (p.common_name||'').toLowerCase().includes(term) || (p.scientific_name||'').toLowerCase().includes(term));
      render();
    }

    function render(){
      list.innerHTML = '';
      visible.slice(0, 120).forEach(p => {
        const node = cardTpl.content.cloneNode(true);
        node.querySelector('.name').textContent = p.common_name || 'Unknown common name';
        node.querySelector('.latin').textContent = p.scientific_name || '';
        node.querySelector('.learn').onclick = async () => {
          const data = await incXP();
          if (data.ok) {
            xpCard.style.display = 'block';
            xpVal.textContent = data.xp;
            badgeWrap.textContent = (data.badges || []).join(' • ');
            const justUnlocked = (data.badges || []).slice(-1)[0];
            if (justUnlocked && data.xp === 5) {
              alert('+1 XP!\nBadge unlocked: Mint Keeper 🌿');
            } else {
              alert(`+1 XP! Total: ${data.xp}`);
            }
          } else {
            alert('Could not save XP (alpha).');
          }
        };
        list.appendChild(node);
      });
    }

    refreshBtn.onclick = loadPlants;
    closeBtn.onclick = () => tg && tg.close();
    q.oninput = filter;

    // Init
    loadXP();
    loadPlants();
  </script>
</body>
</html>
